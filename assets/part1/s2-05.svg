<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f2f2f2"/>
  <!-- wall corner -->
  <line x1="60" y1="40" x2="60" y2="258" stroke="#c2c2c2" stroke-width="4"/>
  <line x1="20" y1="258" x2="380" y2="258" stroke="#9a9a9a" stroke-width="4"/>
  <!-- ladder leaning against the wall -->
  <g stroke="#3c3c3c" stroke-width="7" fill="none" stroke-linecap="round">
    <line x1="96" y1="256" x2="150" y2="60"/>
    <line x1="132" y1="256" x2="186" y2="60"/>
    <!-- rungs -->
    <line x1="146" y1="76" x2="110" y2="76"/>
    <line x1="140" y1="112" x2="106" y2="112"/>
    <line x1="134" y1="150" x2="100" y2="150"/>
    <line x1="128" y1="188" x2="96" y2="188"/>
    <line x1="122" y1="226" x2="92" y2="226"/>
  </g>
</svg>
