<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f2f2f2"/>
  <line x1="20" y1="262" x2="380" y2="262" stroke="#9a9a9a" stroke-width="4"/>
  <!-- shelving unit frame -->
  <rect x="96" y="44" width="208" height="212" fill="none" stroke="#3c3c3c" stroke-width="7"/>
  <line x1="96" y1="116" x2="304" y2="116" stroke="#3c3c3c" stroke-width="7"/>
  <line x1="96" y1="188" x2="304" y2="188" stroke="#3c3c3c" stroke-width="7"/>
  <!-- items on top shelf: boxes -->
  <rect x="112" y="70" width="40" height="42" fill="#e2e2e2" stroke="#6e6e6e" stroke-width="3"/>
  <rect x="164" y="80" width="34" height="32" fill="#c2c2c2" stroke="#6e6e6e" stroke-width="3"/>
  <rect x="212" y="66" width="44" height="46" fill="#e2e2e2" stroke="#6e6e6e" stroke-width="3"/>
  <rect x="266" y="82" width="28" height="30" fill="#c2c2c2" stroke="#6e6e6e" stroke-width="3"/>
  <!-- middle shelf: cans -->
  <g stroke="#6e6e6e" stroke-width="3" fill="#e2e2e2">
    <rect x="116" y="146" width="24" height="40" rx="4"/>
    <rect x="150" y="146" width="24" height="40" rx="4"/>
    <rect x="184" y="146" width="24" height="40" rx="4"/>
    <rect x="230" y="146" width="24" height="40" rx="4"/>
    <rect x="264" y="146" width="24" height="40" rx="4"/>
  </g>
  <!-- bottom shelf: folders -->
  <g stroke="#6e6e6e" stroke-width="3" fill="#c2c2c2">
    <rect x="118" y="212" width="14" height="42"/>
    <rect x="134" y="212" width="14" height="42"/>
    <rect x="150" y="212" width="14" height="42"/>
    <rect x="176" y="212" width="14" height="42"/>
    <rect x="192" y="212" width="14" height="42"/>
    <rect x="250" y="212" width="14" height="42"/>
    <rect x="266" y="212" width="14" height="42"/>
  </g>
</svg>
