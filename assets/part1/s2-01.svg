  <!-- desk -->
  <rect x="196" y="172" width="176" height="10" fill="#3c3c3c"/>
  <rect x="208" y="182" width="9" height="74" fill="#3c3c3c"/>
  <rect x="352" y="182" width="9" height="74" fill="#3c3c3c"/>
